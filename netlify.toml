# Netlify configuration for the programmatic SEO site in site/.
# The site is generated from skills/*/SKILL.md — merging a skill PR to main
# is the only publishing action.

[build]
  base = "site"
  publish = "dist"
  command = "npm run build"
  # Skip builds for commits that touch neither the site nor the skills content.
  # Runs from the base directory (site/), hence the relative paths.
  # Guard: with no previous successful deploy, Netlify sets CACHED_COMMIT_REF
  # equal to COMMIT_REF, which would make the diff empty and cancel every
  # build forever — force those builds through (exit 1 = build).
  ignore = "if [ \"$CACHED_COMMIT_REF\" = \"$COMMIT_REF\" ]; then exit 1; fi; git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ../skills ../netlify.toml"

[build.environment]
  NODE_VERSION = "22"

[build.processing.html]
  pretty_urls = false
